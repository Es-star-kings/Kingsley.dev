<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kingsley Dev Academy</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar" id="sidebar">
  <div class="logo">⚡ Kingsley Dev</div>

  <div class="lesson" onclick="loadLesson(0)">Intro</div>
  <div class="lesson" onclick="loadLesson(1)">Variables</div>
  <div class="lesson" onclick="loadLesson(2)">Functions</div>
  <div class="lesson" onclick="loadLesson(3)">Project</div>
  <div class="lesson" onclick="loadLesson(4)">Quiz</div>
  <button onclick="pay()">Unlock Premium</button>
</div>

<div class="main">

  <div class="header">
    <span class="menu-btn" onclick="toggleMenu()">☰</span>
    <div>Dashboard</div>
    <div class="badge" id="progressText">0%</div>
  </div>

  <div class="content" id="content">

    <div class="card">
      <h1>Welcome 👋</h1>
      <p>Start learning JavaScript the smart way.</p>
    </div>

    <div class="card">
      <h3>Your Progress</h3>
      <div class="progress">
        <div class="progress-bar" id="bar"></div>
      </div>
    </div>

    <div class="card">
        <h2>Login / Signup</h2>
        <input id="email" placeholder="Email"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
      
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()">Login</button>
        <button onclick="logout()">Logout</button>
      </div>

  </div>

</div>

<script type="module" src="./firebase.js"></script>
<script type="module" src="./auth.js"></script>
<script type="module" src="./app.js"></script>
<script type="module" src="./payment.js"></script>
<script src="https://js.paystack.co/v1/inline.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</body>
</html>
